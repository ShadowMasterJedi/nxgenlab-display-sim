<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NxGenLab Display Simulator — DryBox Clima</title>
  <link rel="stylesheet" href="assets/simulator.css">
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Display Simulator</h1>
      <p class="sub">DryBox Clima · ESP32-C6-LCD-1.47 · 320×172<br>Preview layout before flash — local only</p>

      <div class="field">
        <label for="screen">Screen</label>
        <select id="screen">
          <option value="metrics">Metrics</option>
          <option value="status">Status</option>
          <option value="identity">Identity</option>
          <option value="qr">QR</option>
        </select>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="material">Material</label>
          <select id="material">
            <option>PETG</option>
            <option>PLA</option>
            <option>ABS</option>
            <option>TPU</option>
            <option>ASA</option>
            <option>NYLON</option>
            <option>PC</option>
            <option>PVA</option>
          </select>
        </div>
        <div class="field">
          <label>RH limit</label>
          <div id="rh-limit" style="padding:0.45rem 0;font-size:0.875rem;color:var(--accent)">15 %</div>
        </div>
      </div>

      <div class="field">
        <label for="temp">Temperature — <span id="temp-val">24.2 °C</span></label>
        <input type="range" id="temp" min="-10" max="60" step="0.1" value="24.2">
      </div>

      <div class="field">
        <label for="rh">Humidity — <span id="rh-val">43 %</span></label>
        <input type="range" id="rh" min="0" max="100" step="1" value="43">
      </div>

      <div class="field">
        <label for="prev-rh">Previous RH (trend arrow)</label>
        <input type="number" id="prev-rh" min="0" max="100" step="0.1" value="42.5">
      </div>

      <div class="row-2">
        <div class="field">
          <label for="box-name">Box name</label>
          <input type="text" id="box-name" value="Drybox A">
        </div>
        <div class="field">
          <label for="device-id">Device ID</label>
          <input type="text" id="device-id" value="db-001">
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="time">Time (Status header)</label>
          <input type="text" id="time" value="14:32">
        </div>
        <div class="field">
          <label for="chip-fault">MCU thermal</label>
          <select id="chip-fault">
            <option value="none">OK</option>
            <option value="warn">Warn</option>
            <option value="fault">Fault</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="qr-url">QR URL</label>
        <input type="url" id="qr-url" value="https://www.nxgenlab.com">
      </div>

      <div class="checks">
        <label><input type="checkbox" id="sensor-ok" checked> Sensor OK</label>
        <label><input type="checkbox" id="demo-mode"> DEMO mode</label>
        <label><input type="checkbox" id="locked"> Metrics locked</label>
        <label><input type="checkbox" id="boot-hint" checked> Boot hint</label>
        <label><input type="checkbox" id="ble-connected"> BLE connected</label>
        <label><input type="checkbox" id="mqtt-enabled"> MQTT enabled</label>
      </div>

      <div class="btn-row">
        <button type="button" id="btn-next" title="Simulate BOOT short">Next screen</button>
        <button type="button" id="btn-lock" title="Simulate BOOT long">Lock metrics</button>
        <button type="button" id="btn-reset">Reset</button>
        <button type="button" id="btn-export" class="primary">Export PNG</button>
      </div>

      <div class="btn-row" style="margin-top:0.5rem">
        <button type="button" id="jump-metrics">Metrics</button>
        <button type="button" id="jump-status">Status</button>
        <button type="button" id="jump-identity">Identity</button>
        <button type="button" id="jump-qr">QR</button>
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="device-shell">
        <div class="device-label">Waveshare ESP32-C6-LCD-1.47 · ST7789 landscape</div>
        <div class="device-viewport">
          <div class="device-viewport-inner">
            <div id="device-screen" class="device-screen" aria-label="320 by 172 display preview"></div>
          </div>
        </div>
      </div>
      <p id="screen-meta" class="preview-meta">Screen 1/4 · Metrics · 320×172</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
